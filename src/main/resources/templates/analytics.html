<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Financial Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<nav class="navbar bg-body-tertiary" data-bs-theme="dark">
    <div class="container-fluid">
        <h1 class="navbar-brand">Financial Dashboard</h1>
        <ul class="d-flex list-unstyled" role="search">
            <li class="me-4"><a class="text-white text-decoration-none" th:href="@{/dashboard/{id}(id=${account.id})}">My Account</a></li>
        </ul>
    </div>
</nav>
<br>
<br>
<div style="height: 600px">
    <canvas id="barChart" class="w-100 mb-4" ></canvas>
</div>
<div class="d-flex gap-4 w-100" style="height: 650px">
    <div class="flex-fill h-100">
        <canvas id="moneyChart" ></canvas>
    </div>
    <div class="flex-fill h-100">
        <canvas id="doughnutChart"></canvas>
    </div>
</div>


<script>
    const barChart = document.getElementById('barChart');
    const pieChart = document.getElementById('moneyChart');
    const doughnutChart = document.getElementById('doughnutChart');

    let received = [[${received}]];
    let spent = [[${spent}]];

    new Chart(barChart, {
      type: 'bar',
      data: {
        labels: ['Received', 'Spent'],
        datasets: [{
          label: 'Amount',
          data: [received, spent],
          borderWidth: 1
        }]
      },
      options: {
        scales: {
          y: {
            beginAtZero: true
          }
        }
      }
    });

    new Chart(pieChart, {
      type: 'pie',
      data: {
        labels: ['Money received', 'Money spent'],
        datasets: [{
          data: [received, spent],
        }]
      }
    });

    new Chart(doughnutChart, {
        type: 'doughnut',
        data: {
            labels: ['Money received', 'Money spent'],
            datasets: [{
                data: [received, spent],
                backgroundColor: [
                    'rgb(255, 99, 132)',
                    'rgb(54, 162, 235)',
                ],
                hoverOffset: 4
            }]
        },
    });

</script>
</body>
</html>
